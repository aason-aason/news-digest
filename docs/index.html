<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Digest - 2026年04月12日</title>
  <style>
    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --text:      #111111;
      --subtext:   #4a4a4a;
      --muted:     #888888;
      --border:    #e4e4e4;
      --hdr:       rgba(255,255,255,0.92);
      --shadow:    0 1px 6px rgba(0,0,0,0.07);
      --urgent-bg: #fff4f4;
      --urgent-border: #ff4444;
    }
    [data-theme="dark"] {
      --bg:        #18191a;
      --surface:   #242526;
      --text:      #e4e6eb;
      --subtext:   #b0b3b8;
      --muted:     #777;
      --border:    #3a3b3c;
      --hdr:       rgba(24,25,26,0.95);
      --shadow:    0 1px 6px rgba(0,0,0,0.4);
      --urgent-bg: #2a1a1a;
      --urgent-border: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.8;
      transition: background 0.3s, color 0.3s;
    }

    /* ヘッダー */
    header {
      background: var(--hdr);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 800; }
    header .date { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .saved-link {
      font-size: 0.82rem;
      color: var(--subtext);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      transition: background 0.2s;
    }
    .saved-link:hover { background: var(--border); }
    .dark-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
      transition: background 0.2s;
    }
    .dark-btn:hover { background: var(--border); }
    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border: 2px solid var(--c, #888);
      border-radius: 20px;
      background: none;
      color: var(--c, #888);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--c, #888);
      color: #fff;
    }
    .filter-btn[data-cat="all"] { --c: #555; }

    /* メインコンテンツ */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* 🔴 緊急アラート枠 */
    .urgent-section {
      background: var(--urgent-bg);
      border: 2px solid var(--urgent-border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .urgent-section .section-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--urgent-border);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* カテゴリセクション */
    .category-section { display: flex; flex-direction: column; gap: 4px; }
    .category-label {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 0 4px;
      margin-bottom: 8px;
    }

    /* 記事カード */
    .item {
      background: var(--surface);
      border-radius: 14px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-header { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
    .imp-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .imp-urgent  { background: #ffe0e0; color: #cc0000; }
    .imp-important { background: #fff3e0; color: #b35a00; }
    .imp-useful  { background: #e8f5e9; color: #2e7d32; }
    .item h2 {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.55;
      color: var(--text);
    }
    .item .summary {
      font-size: 0.96rem;
      color: var(--subtext);
      line-height: 1.9;
    }
    details { border-top: 1px solid var(--border); padding-top: 12px; }
    summary {
      font-size: 0.83rem;
      color: #1a73e8;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▶ もっと詳しく"; }
    details[open] summary::before { content: "▲ 閉じる"; }
    .detail-text {
      font-size: 0.9rem;
      color: var(--subtext);
      line-height: 1.8;
      margin-top: 12px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .source-link {
      font-size: 0.8rem;
      color: #1a73e8;
      text-decoration: none;
      display: inline-block;
      margin-top: 2px;
    }
    .source-link:hover { text-decoration: underline; }
    .actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: none;
      color: var(--subtext);
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.star-btn.starred {
      border-color: #f5a623;
      color: #f5a623;
      background: #fff8ed;
    }
    [data-theme="dark"] .action-btn.star-btn.starred {
      background: #2a2010;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>News Digest</h1>
        <p class="date">2026年04月12日 更新</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <a class="saved-link" href="saved.html">⭐ 保存済み</a>
        <button class="dark-btn" id="darkBtn">🌙 ダーク</button>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-cat="all">すべて</button>
<button class="filter-btn" data-cat="テック・AI" style="--c:#666">テック・AI</button>

    </div>
  </header>
  <main>
    
    <section class="category-section" data-cat="テック・AI">
      <p class="category-label" style="color:#666">● テック・AI</p>
      <div class="item" style="animation-delay:0.00s">
      <div class="item-header">
        <span class="imp-badge imp-important">🟡 重要</span>
      </div>
      <h2>テスト記事</h2>
      <p class="summary">テスト要約です</p>
      <details>
        <summary></summary>
        <p class="detail-text">詳細です</p>
      </details>
      <a class="source-link" href="https://example.com" target="_blank" rel="noopener">📰 TechCrunch</a>
      <div class="actions">
        <button class="action-btn star-btn"
          data-id="https%3A%2F%2Fexample.com"
          data-title="テスト記事"
          data-summary="テスト要約です"
          data-source="TechCrunch"
          data-url="https://example.com"
          data-importance="🟡"
          data-category="テック・AI">⭐ 保存</button>
        <a class="action-btn" href="https://twitter.com/intent/tweet?text=%E3%83%86%E3%82%B9%E3%83%88%E8%A8%98%E4%BA%8B%20https%3A%2F%2Fexample.com" target="_blank" rel="noopener">𝕏 投稿</a>
        <button class="action-btn claude-btn" data-title="テスト記事">🤖 Claudeに聞く</button>
      </div>
    </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    // トースト通知
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ダークモード
    const btn = document.getElementById('darkBtn');
    const root = document.documentElement;
    const saved = localStorage.getItem('theme') || 'light';
    root.dataset.theme = saved;
    btn.textContent = saved === 'dark' ? '☀️ ライト' : '🌙 ダーク';
    btn.addEventListener('click', () => {
      const dark = root.dataset.theme !== 'dark';
      root.dataset.theme = dark ? 'dark' : 'light';
      btn.textContent = dark ? '☀️ ライト' : '🌙 ダーク';
      localStorage.setItem('theme', root.dataset.theme);
    });

    // カテゴリフィルター
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.cat;
        document.querySelectorAll('.category-section, .urgent-section').forEach(sec => {
          if (cat === 'all') {
            sec.style.display = '';
          } else if (cat === 'urgent') {
            sec.style.display = sec.classList.contains('urgent-section') ? '' : 'none';
          } else {
            sec.style.display = sec.dataset.cat === cat ? '' : 'none';
          }
        });
      });
    });

    // ⭐ 星ボタン（記事データごとlocalStorageに保存）
    const STAR_KEY = 'starred_articles';
    function getStarred() { return JSON.parse(localStorage.getItem(STAR_KEY) || '{}'); }
    function saveStarred(obj) { localStorage.setItem(STAR_KEY, JSON.stringify(obj)); }

    document.querySelectorAll('.star-btn').forEach(btn => {
      const id = btn.dataset.id;
      if (getStarred()[id]) btn.classList.add('starred');
      btn.addEventListener('click', () => {
        let obj = getStarred();
        if (obj[id]) {
          delete obj[id];
          btn.classList.remove('starred');
          showToast('保存を解除しました');
        } else {
          obj[id] = {
            id,
            title:       btn.dataset.title,
            summary:     btn.dataset.summary,
            source_name: btn.dataset.source,
            url:         btn.dataset.url,
            importance:  btn.dataset.importance,
            category:    btn.dataset.category,
          };
          btn.classList.add('starred');
          showToast('⭐ 保存しました');
        }
        saveStarred(obj);
      });
    });

    // 🤖 Claudeに聞くボタン（クリップボードコピー）
    document.querySelectorAll('.claude-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const title = btn.dataset.title;
        navigator.clipboard.writeText(title).then(() => {
          showToast('タイトルをコピーしました');
          setTimeout(() => window.open('https://claude.ai/new', '_blank'), 300);
        }).catch(() => {
          window.open('https://claude.ai/new', '_blank');
        });
      });
    });
  </script>
</body>
</html>
