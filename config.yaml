rss:
  max_articles_per_feed: 3
  sources:
    # テック・AI
    - name: "TechCrunch"
      url: "https://techcrunch.com/feed/"
      categories: ["テック・AI"]
    - name: "TechCrunch Startups"
      url: "https://techcrunch.com/category/startups/feed/"
      categories: ["テック・AI"]

    # Anthropic
    - name: "Anthropic Blog"
      url: "https://www.anthropic.com/news/rss.xml"
      categories: ["Anthropic"]

    # 音楽 / DTM（重複ソースはcategoriesで両方指定）
    - name: "MusicRadar"
      url: "https://www.musicradar.com/feeds/all"
      categories: ["音楽", "DTM"]
    - name: "Attack Magazine"
      url: "https://www.attackmagazine.com/feed/"
      categories: ["音楽", "DTM"]
    - name: "Bedroom Producers Blog"
      url: "https://bedroomproducersblog.com/feed/"
      categories: ["DTM"]
